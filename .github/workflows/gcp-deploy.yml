name: Deploy to GCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  TERRAFORM_VERSION: 1.6.0

jobs:
  # Build and push Docker images
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.push-backend.outputs.image }}
      frontend-image: ${{ steps.push-frontend.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        id: push-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            gcr.io/${{ env.GCP_PROJECT_ID }}/devops-backend:${{ github.sha }}
            gcr.io/${{ env.GCP_PROJECT_ID }}/devops-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        id: push-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            gcr.io/${{ env.GCP_PROJECT_ID }}/devops-frontend:${{ github.sha }}
            gcr.io/${{ env.GCP_PROJECT_ID }}/devops-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        working-directory: ./infrastructure/gcp
        run: terraform fmt -check -recursive

      - name: Terraform Init (Dev)
        working-directory: ./infrastructure/gcp
        run: |
          terraform init \
            -backend-config="bucket=devops-tf-state-${{ env.GCP_PROJECT_ID }}" \
            -backend-config="prefix=gcp/dev"

      - name: Terraform Plan (Dev)
        working-directory: ./infrastructure/gcp
        run: terraform plan -var-file=dev.tfvars -out=tfplan

      - name: Terraform Apply (Dev)
        working-directory: ./infrastructure/gcp
        run: terraform apply -auto-approve

  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy-dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init (Staging)
        working-directory: ./infrastructure/gcp
        run: |
          terraform init \
            -backend-config="bucket=devops-tf-state-${{ env.GCP_PROJECT_ID }}" \
            -backend-config="prefix=gcp/staging"

      - name: Terraform Plan (Staging)
        working-directory: ./infrastructure/gcp
        run: terraform plan -var-file=staging.tfvars -out=tfplan

      - name: Terraform Apply (Staging)
        working-directory: ./infrastructure/gcp
        run: terraform apply -auto-approve

  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    needs: deploy-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init (Prod)
        working-directory: ./infrastructure/gcp
        run: |
          terraform init \
            -backend-config="bucket=devops-tf-state-${{ env.GCP_PROJECT_ID }}" \
            -backend-config="prefix=gcp/prod"

      - name: Terraform Plan (Prod)
        working-directory: ./infrastructure/gcp
        run: terraform plan -var-file=prod.tfvars -out=tfplan

      - name: Terraform Apply (Prod)
        working-directory: ./infrastructure/gcp
        run: terraform apply -auto-approve
