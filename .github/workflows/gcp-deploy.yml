name: Deploy to GCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  TERRAFORM_VERSION: 1.6.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.build-backend.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: devops-backend:build
          cache-from: type=gha

      - name: Build frontend image
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: devops-frontend:build
          cache-from: type=gha

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init (Dev)
        working-directory: ./infrastructure/gcp
        run: |
          terraform init -backend-config="bucket=devops-assignment-tf-state" -backend-config="prefix=gcp/dev"

      - name: Terraform Plan (Dev)
        working-directory: ./infrastructure/gcp
        run: terraform plan -var-file=dev.tfvars -out=tfplan

      - name: Terraform Apply (Dev)
        working-directory: ./infrastructure/gcp
        run: terraform apply -auto-approve

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init (Staging)
        working-directory: ./infrastructure/gcp
        run: |
          terraform init -backend-config="bucket=devops-assignment-tf-state" -backend-config="prefix=gcp/staging"

      - name: Terraform Plan (Staging)
        working-directory: ./infrastructure/gcp
        run: terraform plan -var-file=staging.tfvars -out=tfplan

      - name: Terraform Apply (Staging)
        working-directory: ./infrastructure/gcp
        run: terraform apply -auto-approve

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init (Prod)
        working-directory: ./infrastructure/gcp
        run: |
          terraform init -backend-config="bucket=devops-assignment-tf-state" -backend-config="prefix=gcp/prod"

      - name: Terraform Plan (Prod)
        working-directory: ./infrastructure/gcp
        run: terraform plan -var-file=prod.tfvars -out=tfplan

      - name: Terraform Apply (Prod)
        working-directory: ./infrastructure/gcp
        run: terraform apply -auto-approve
