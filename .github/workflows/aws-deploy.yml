name: Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.6.0

jobs:
  # Build and push Docker images (shared across environments)
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.push-backend.outputs.image }}
      frontend-image: ${{ steps.push-frontend.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        id: push-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/devops-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        id: push-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/devops-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ./infrastructure/aws
        run: |
          terraform init \
            -backend-config="bucket=devops-assignment-tf-state" \
            -backend-config="key=aws/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=devops-assignment-tf-lock"

      - name: Terraform Plan (Dev)
        working-directory: ./infrastructure/aws
        run: terraform plan -var-file=dev.tfvars -out=tfplan

      - name: Terraform Apply (Dev)
        working-directory: ./infrastructure/aws
        run: terraform apply -auto-approve

  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy-dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init (Staging)
        working-directory: ./infrastructure/aws
        run: |
          terraform init \
            -backend-config="bucket=devops-assignment-tf-state" \
            -backend-config="key=aws/staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=devops-assignment-tf-lock"

      - name: Terraform Plan (Staging)
        working-directory: ./infrastructure/aws
        run: terraform plan -var-file=staging.tfvars -out=tfplan

      - name: Terraform Apply (Staging)
        working-directory: ./infrastructure/aws
        run: terraform apply -auto-approve

  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    needs: deploy-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init (Prod)
        working-directory: ./infrastructure/aws
        run: |
          terraform init \
            -backend-config="bucket=devops-assignment-tf-state" \
            -backend-config="key=aws/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=devops-assignment-tf-lock"

      - name: Terraform Plan (Prod)
        working-directory: ./infrastructure/aws
        run: terraform plan -var-file=prod.tfvars -out=tfplan

      - name: Terraform Apply (Prod)
        working-directory: ./infrastructure/aws
        run: terraform apply -auto-approve
