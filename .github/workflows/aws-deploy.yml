name: Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.6.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.build-backend.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: devops-backend:build
          cache-from: type=gha

      - name: Build frontend image
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: devops-frontend:build
          cache-from: type=gha

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ./infrastructure/aws
        run: |
          terraform init -backend-config="bucket=devops-assignment-tf-state" -backend-config="key=aws/dev/terraform.tfstate" -backend-config="region=us-east-1" -backend-config="dynamodb_table=devops-assignment-tf-lock"

      - name: Terraform Plan (Dev)
        working-directory: ./infrastructure/aws
        run: terraform plan -var-file=dev.tfvars -out=tfplan

      - name: Terraform Apply (Dev)
        working-directory: ./infrastructure/aws
        run: terraform apply -auto-approve

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init (Staging)
        working-directory: ./infrastructure/aws
        run: |
          terraform init -backend-config="bucket=devops-assignment-tf-state" -backend-config="key=aws/staging/terraform.tfstate" -backend-config="region=us-east-1" -backend-config="dynamodb_table=devops-assignment-tf-lock"

      - name: Terraform Plan (Staging)
        working-directory: ./infrastructure/aws
        run: terraform plan -var-file=staging.tfvars -out=tfplan

      - name: Terraform Apply (Staging)
        working-directory: ./infrastructure/aws
        run: terraform apply -auto-approve

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init (Prod)
        working-directory: ./infrastructure/aws
        run: |
          terraform init -backend-config="bucket=devops-assignment-tf-state" -backend-config="key=aws/prod/terraform.tfstate" -backend-config="region=us-east-1" -backend-config="dynamodb_table=devops-assignment-tf-lock"

      - name: Terraform Plan (Prod)
        working-directory: ./infrastructure/aws
        run: terraform plan -var-file=prod.tfvars -out=tfplan

      - name: Terraform Apply (Prod)
        working-directory: ./infrastructure/aws
        run: terraform apply -auto-approve
